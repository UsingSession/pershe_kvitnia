<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src https://media.giphy.com; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
  <title>1 квітня 🎉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      padding: 20px;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      padding: 40px 50px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      max-width: 700px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .april-tag {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #e84393;
      margin-bottom: 12px;
    }

    .main-text {
      font-size: 1.9rem;
      font-weight: 800;
      color: #2d3436;
      line-height: 1.4;
      margin-bottom: 30px;
    }

    .main-text span.highlight {
      color: #e84393;
    }

    .gif-wrapper {
      position: relative;
      width: 100%;
      height: 260px;
      margin-bottom: 30px;
      border-radius: 16px;
      overflow: hidden;
      background: #f0f0f0;
    }

    .gif-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .gif-wrapper img.active {
      opacity: 1;
    }

    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s ease, transform 0.3s ease;
      cursor: pointer;
    }

    .dot.active {
      background: #e84393;
      transform: scale(1.3);
    }

    .footer-emoji {
      font-size: 2rem;
      letter-spacing: 8px;
    }

    /* Confetti particles */
    .confetti {
      position: fixed;
      top: -10px;
      width: 10px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: confettiFall linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Confetti generated by JS -->

  <div class="container">
    <p class="april-tag">🎉 1 квітня &mdash; День сміху 🎉</p>

    <h1 class="main-text">
      Ага попався,<br>що <span class="highlight">phishinacademy</span><br>нічого не навчив!
    </h1>

    <div class="gif-wrapper" id="gifWrapper">
      <!-- Images inserted by JS -->
    </div>

    <div class="progress-dots" id="progressDots"></div>

    <p class="footer-emoji">😂 🤡 🎊 🐟 🎉</p>
  </div>

  <script>
    // GIFs – fun/celebratory, hosted on Giphy (direct media links)
    const gifs = [
      'https://media.giphy.com/media/3o7TKwmnDgQb5jemjK/giphy.gif',  // laughing
      'https://media.giphy.com/media/l3q2K5jinAlChoCLS/giphy.gif',  // got ya / surprise
      'https://media.giphy.com/media/Ov5NiLVXT8JEc/giphy.gif',      // trollface laugh
      'https://media.giphy.com/media/Q7ozWVYCR0nyW2rvPW/giphy.gif', // april fools prank
      'https://media.giphy.com/media/26AHONQ79FdWZhAI0/giphy.gif',  // celebration confetti
    ];

    const wrapper = document.getElementById('gifWrapper');
    const dotsContainer = document.getElementById('progressDots');

    let current = 0;
    const imgEls = [];
    const dotEls = [];

    // Build img elements
    gifs.forEach((src, i) => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = 'April Fools gif ' + (i + 1);
      if (i === 0) img.classList.add('active');
      wrapper.appendChild(img);
      imgEls.push(img);

      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => switchTo(i));
      dotsContainer.appendChild(dot);
      dotEls.push(dot);
    });

    function switchTo(index) {
      imgEls[current].classList.remove('active');
      dotEls[current].classList.remove('active');
      current = index;
      imgEls[current].classList.add('active');
      dotEls[current].classList.add('active');
    }

    // Auto-rotate every 3 seconds
    const rotationTimer = setInterval(() => {
      switchTo((current + 1) % gifs.length);
    }, 3000);

    // Clean up timer if the page is ever unloaded (e.g., inside an iframe/SPA)
    window.addEventListener('unload', () => clearInterval(rotationTimer));

    // Confetti
    const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (10 + Math.random() * 10) + 'px';
      el.style.animationDuration = (3 + Math.random() * 5) + 's';
      el.style.animationDelay = (Math.random() * 6) + 's';
      document.body.appendChild(el);
    }
  </script>
</body>
</html>
